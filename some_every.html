<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var students =["pavani","vani","divya","deepthi","murali","jyothi"]
        //every -to check given condition is true or false
        var result=students.every(function(val){
            return val.length >= 4;
        })
        console.log(result)

        //some- even if one value true evrything is true
        var result_1=students.some(function(val){
            return val.length == 5;
        })
        console.log(result_1)
    </script>
</body>
</html>

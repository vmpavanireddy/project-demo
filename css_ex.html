<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS styles */
        /* colors and background */
        body {
            color: #ff5959;
            font-size: 18px;
            text-align: center;
            font-family: Arial;
            /* gradient background */
            background: linear-gradient(45deg, #ff5959, #ffca3a);
            /*css units px, %, rem, em example */
            padding: 20px;
            margin: 0;
            /* border example */
            border: 2px solid #ff5959;
            /* border radius example */
            border-radius: 10px;
            /* box shadow example */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            /* transition example */
            transition: all 0.3s ease;
            /* animation example */
            animation: fadeIn 2s ease-in-out;
        }

        body:hover {
            background: linear-gradient(45deg, #ffca3a, #ff5959);
            color: #fff;
            transform: scale(1.05);
        }
        /*  keyframes for animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        /* media query example */
        @media (max-width: 600px) {
            body {
                font-size: 16px;
                padding: 10px;
            }
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .grid-item {
            background-color: #000000;
            padding: 20px;
            border: 1px solid #ff5959;
            border-radius: 5px;
        }
         h1,
    p {
        background: transparent !important;
        color: rgb(225, 0, 0);
    }
        /* flexbox example */
        .flex-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .flex-item {
            background-color: #ffca3a;
            padding: 20px;
            border: 1px solid #ff5959;
            border-radius: 5px;
        }
        /* pseudo-class example */
        .button {
            background-color: #ff5959;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #ffca3a;
        }   
        /* pseudo-element example */
        .container::before {
            content: "Welcome to CSS Example";
            display: block;
            font-size: 24px;
            margin-bottom: 20px;
            color: #ff5959;
        }
        /* attribute selector example */
        [data-highlight] {
            background-color: #ffca3a;
            padding: 10px;  
            border: 1px solid #ff5959;
            border-radius: 5px;
        }
        /* CSS variables example */
        :root {
            --primary-color: #ff5959;
            --secondary-color: #ffca3a;     
        }
        /* CSS grid example */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .grid-item {
            background-color: var(--secondary-color);
            padding: 20px;
            border: 1px solid var(--primary-color);
            border-radius: 5px;
        }
        /* CSS transitions example */
        .transition-example {
            background-color: var(--primary-color);
            color: #5f0707;
            padding: 10px 20px;
            border: none;
            border-radius: 5px; 
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease;
        }
        .transition-example:hover {
            background-color: var(--secondary-color);
            transform: scale(1.1);
        }
        // CSS animation example
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);   
            }
            40% {
                transform: translateY(-30px);
            }
            60% {
                transform: translateY(-15px);
            }
        }
        .animation-example {
            background-color: var(--primary-color);
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            animation: bounce 2s infinite;
        }
        /* CSS pseudo-class example */
        .pseudo-class-example {
            background-color: var(--primary-color);
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .pseudo-class-example:focus {
            outline: none;
            box-shadow: 0 0 5px var(--secondary-color);
        }
        /* CSS pseudo-element example */
        .pseudo-element-example::after {
            content: " (Click me)";
            color: var(--secondary-color);
        }   

    </style>
</head>
<body>
    /* HTML content */
    <div class="container">
        <div class="grid-container">
            <div class="grid-item">Grid Item 1</div>
            <div class="grid-item">Grid Item 2</div>
            <div class="grid-item">Grid Item 3</div>
        </div>
        <div class="flex-container">
            <div class="flex-item">Flex Item 1</div>
            <div class="flex-item">Flex Item 2</div>
            <div class="flex-item">Flex Item 3</div>
        </div>
        <button class="button">Hover Me</button>
        <div data-highlight>Attribute Selector Example</div>
        <button class="transition-example">Transition Example</button>
        <button class="animation-example">Animation Example</button>    
        <button class="pseudo-class-example">Pseudo-Class Example</button>
        <button class="pseudo-element-example">Pseudo-Element Example</button>
    </div>
    // JavaScript example
    <script>
        document.querySelector('.button').addEventListener('click', function() {
            alert('Button clicked!');
        });
    </script>
</body>
</html>

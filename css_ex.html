<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS styles */
        /* colors and background */
        body {
            color: #ff5959;
            font-size: 18px;
            text-align: center;
            font-family: Arial;
            /* gradient background */
            background: linear-gradient(45deg, #ff5959, #ffca3a);
            /*css units px, %, rem, em example */
            padding: 20px;
            margin: 0;
            /* border example */
            border: 2px solid #ff5959;
            /* border radius example */
            border-radius: 10px;
            /* box shadow example */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            /* transition example */
            transition: all 0.3s ease;
            /* animation example */
            animation: fadeIn 2s ease-in-out;
        }

        body:hover {
            background: linear-gradient(45deg, #ffca3a, #ff5959);
            color: #fff;
            transform: scale(1.05);
        }
        /*  keyframes for animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        /* media query example */
        @media (max-width: 600px) {
            body {
                font-size: 16px;
                padding: 10px;
            }
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .grid-item {
            background-color: #ffca3a;
            padding: 20px;
            border: 1px solid #ff5959;
            border-radius: 5px;
        }
        /* flexbox example */
        .flex-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .flex-item {
            background-color: #ffca3a;
            padding: 20px;
            border: 1px solid #ff5959;
            border-radius: 5px;
        }
        // pseudo-class example
        .button {
            background-color: #ff5959;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #ffca3a;
        }   
        
    </style>
</head>
<body>
    
</body>
</html>

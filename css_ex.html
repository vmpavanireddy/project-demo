<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* CSS styles */
        /* colors and background */
        body {
            color: #ff5959;
            font-size: 18px;
            text-align: center;
            font-family: Arial;
            /* gradient background */
            background: linear-gradient(45deg, #ff5959, #ffca3a);
            /*css units px, %, rem, em example */
            padding: 20px;
            margin: 0;
            /* border example */
            border: 2px solid #ff5959;
            /* border radius example */
            border-radius: 10px;
            /* box shadow example */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            /* transition example */
            transition: all 0.3s ease;
            /* animation example */
            animation: fadeIn 2s ease-in-out;
        }

        body:hover {
            background: linear-gradient(45deg, #ffca3a, #ff5959);
            color: #fff;
            transform: scale(1.05);
        }
        
    </style>
</head>
<body>
    
</body>
</html>

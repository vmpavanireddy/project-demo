<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // JavaScript code
        // variables and data types
        let name = "John Doe"; // string
        let age = 30; // number
        let isStudent = true; // boolean
        let hobbies = ["reading", "traveling", "coding"]; // array
        let person = { name: "Jane Doe", age: 25 }; // object

        // functions and control flow
        function greet(personName) {
            if (personName) {
                return `Hello, ${personName}!`;
            } else {
                return "Hello!";
            }
        }

        console.log(greet(name));
        console.log(greet(person.name));
        console.log(greet());
        for (let hobby of hobbies) {
            console.log(`I enjoy ${hobby}.`);
        }
        function calculateSum(a, b) {
            return a + b;
        }
        console.log(`The sum of 5 and 10 is: ${calculateSum(5, 10)}`);
        // DOM manipulation
        const heading = document.createElement("h1");
        heading.textContent = "Welcome to the Exam Page";
        document.body.appendChild(heading);
        // event handling
        const button = document.createElement("button");
        button.textContent = "Click Me";
        button.addEventListener("click", () => {
            alert("Button was clicked!");
        });
        document.body.appendChild(button);
        // asynchronous programming
        async function fetchData() {
            try {   
                const response = await fetch("https://jsonplaceholder.typicode.com/posts/1");
                const data = await response.json();
                console.log(data);
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }
        fetchData();
        // ES6 features
        const multiply = (x, y) => x * y;   
        const result = multiply(4, 5);
        console.log(`The result of multiplying 4 and 5 is: ${result}`); 
        const [firstHobby, secondHobby] = hobbies;
        console.log(`My first hobby is: ${firstHobby}`);
        confirm("Do you want to see the second hobby?");
        console.log(`My second hobby is: ${secondHobby}`);
        // template literals
        const message = `My name is ${name} and I am ${age} years old.`;
        console.log(message);   
        // error handling
        try {
            const invalidOperation = 10 / 0; // This will not throw an error in JavaScript, but let's simulate an error
            if (!isFinite(invalidOperation)) {  
                throw new Error("Division by zero is not allowed.");
            }
        } catch (error) {
            console.error("Caught an error:", error.message);
        }
        // regular expressions
        const regex = /^[A-Za-z]+$/;
        const testString = "HelloWorld";
        if (regex.test(testString)) {
            console.log(`${testString} contains only letters.`);
        } else {
            console.log(`${testString} contains characters other than letters.`);
        }
        // closures
        function outerFunction(outerVariable) {
            return function innerFunction(innerVariable) {
                console.log(`Outer variable: ${outerVariable}`);
                console.log(`Inner variable: ${innerVariable}`);
            };
        }
        const newFunction = outerFunction("outside");
        newFunction("inside");
    </script>

</body>
</html>

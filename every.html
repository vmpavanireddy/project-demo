<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Form Example</title>
    <!-- May 13th commit -->
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { max-width: 500px; margin: auto; }
        label { display: block; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 6px; box-sizing: border-box; }
        .button-row { margin-top: 16px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <h1>Every Form Example</h1>
    <p>This page demonstrates different HTML input types in one form.</p>
    <!-- This form shows a variety of HTML input types in one single form -->

    <form action="#" method="post">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1" max="120">

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">

        <label for="color">Favorite Color:</label>
        <input type="color" id="color" name="color">

        <label for="website">Website:</label>
        <input type="url" id="website" name="website">

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone">

        <label for="search">Search:</label>
        <input type="search" id="search" name="search" placeholder="Search games or topics">

        <label for="avatar">Upload Avatar:</label>
        <input type="file" id="avatar" name="avatar" accept="image/*">

        <label for="bio">Bio:</label>
        <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself"></textarea>

        <label>Preferred Platform:</label>
        <select id="platform" name="platform">
            <option value="pc">PC</option>
            <option value="console">Console</option>
            <option value="mobile">Mobile</option>
        </select>

        <div class="button-row">
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </div>
    </form>
</body>
</html>

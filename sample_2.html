<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p::after{
            content: " - This is a pseudo element";
            color: red;
        }
        p::before{
            content: "This is a pseudo element - ";
            color: blue;
        }
        h2::first-letter{
            font-size: 200%;
            color: green;
        }
        h1::first-line{
            font-size: 150%;
            color: orange;
        }
    </style>
</head>
<body>
    <p>about gaming</p>
    <h2>welcome user</h2>
    <h1>CSS Pseudo Elements</h1>
</body>
</html>

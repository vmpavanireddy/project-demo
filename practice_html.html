        <label for="firstname">First Name:</label>
        <!-- First name input -->
        <input type="text" id="firstname" name="firstname" required><br><br>

        <label for="lastname">Last Name:</label>
        <!-- Last name input -->
        <input type="text" id="lastname" name="lastname"><br><br>

        <label for="company">Company:</label>
        <!-- Company input -->
        <input type="text" id="company" name="company"><br><br>

        <label for="designation">Designation:</label>
        <!-- Designation input -->
        <input type="text" id="designation" name="designation"><br><br>

        <label for="website">Website:</label>
        <!-- Website input -->
        <input type="url" id="website" name="website"><br><br>

        <label for="github">GitHub Profile:</label>
        <!-- GitHub URL input -->
        <input type="url" id="github" name="github"><br><br>

        <label for="linkedin">LinkedIn Profile:</label>
        <!-- LinkedIn URL input -->
        <input type="url" id="linkedin" name="linkedin"><br><br>

        <label for="experience">Years of Experience:</label>
        <!-- Experience input -->
        <input type="number" id="experience" name="experience" min="0"><br><br>

        <label for="skills">Skills:</label>
        <!-- Skills textarea -->
        <textarea id="skills" name="skills" rows="4" cols="50"></textarea><br><br>

        <label for="availability">Available for Work:</label>
        <!-- Availability checkbox -->
        <input type="checkbox" id="availability" name="availability"><br><br>

        <label for="education">Education Level:</label>
        <!-- Education selector -->
        <select id="education" name="education">
            <option value="highschool">High School</option>
            <option value="bachelors">Bachelors</option>
            <option value="masters">Masters</option>
            <option value="phd">PhD</option>
        </select><br><br>

        <label for="portfolio">Portfolio URL:</label>
        <!-- Portfolio link input -->
        <input type="url" id="portfolio" name="portfolio"><br><br>

        <label for="salary_expectation">Salary Expectation:</label>
        <!-- Salary range input -->
        <input type="number" id="salary_expectation" name="salary_expectation" min="0"><br><br>

        <label for="remote_work">Remote Work Preference:</label>
        <!-- Remote work checkbox -->
        <input type="checkbox" id="remote_work" name="remote_work"><br><br>

        <label for="start_date">Availability Start Date:</label>
        <!-- Available date picker -->
        <input type="date" id="start_date" name="start_date"><br><br>

        <label for="references">References:</label>
        <!-- References textarea -->
        <textarea id="references" name="references" rows="3" cols="50"></textarea><br><br>

        <label for="certifications">Certifications:</label>
        <!-- Certifications textarea -->
        <textarea id="certifications" name="certifications" rows="3" cols="50"></textarea><br><br>

        <label for="work_type">Preferred Work Type:</label>
        <!-- Work type selector -->
        <select id="work_type" name="work_type">
            <option value="fulltime">Full-time</option>
            <option value="parttime">Part-time</option>
            <option value="contract">Contract</option>
            <option value="freelance">Freelance</option>
        </select><br><br>

        <label for="cover_letter">Cover Letter:</label>
        <!-- Cover letter textarea -->
        <textarea id="cover_letter" name="cover_letter" rows="5" cols="50"></textarea><br><br>

        <label for="terms_accept">Accept Terms and Conditions:</label>
        <!-- Terms acceptance checkbox -->
        <input type="checkbox" id="terms_accept" name="terms_accept" required><br><br>

        <label for="middlename">Middle Name:</label>
        <!-- Middle name input -->
        <input type="text" id="middlename" name="middlename"><br><br>

        <label for="nickname">Nickname:</label>
        <!-- Nickname input -->
        <input type="text" id="nickname" name="nickname"><br><br>

        <label for="dob">Date of Birth:</label>
        <!-- Date of birth input -->
        <input type="date" id="dob" name="dob"><br><br>

        <label for="nationality">Nationality:</label>
        <!-- Nationality input -->
        <input type="text" id="nationality" name="nationality"><br><br>

        <label for="address">Address:</label>
        <!-- Address textarea -->
        <textarea id="address" name="address" rows="3" cols="50"></textarea><br><br>

        <label for="city">City:</label>
        <!-- City input -->
        <input type="text" id="city" name="city"><br><br>

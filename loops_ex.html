<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var i = 0;
        while (i < 5) {
            document.writeln(i + "<br/>");
            i++;
        }
        do {
            document.writeln(i + "<br/>");
            i++;
        } while (i < 10);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button.hover{
            background: rgb(205, 60, 20);
            color: white;
            border:none;
        }
        button.active{
            background: rgb(20, 205, 60);
            color: white;
            border:none;
        }
        input.focus{
            background:red;
        }
        a.visited{
            background: rgb(113, 96, 159);
            color: white;
                border:none;
        }
        li.last-child{
            background: rgb(202, 20, 205);
        }
    </style>
</head>
<body>
    <form action="">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br>
    <button>Click Me</button>
    </form>
    <a href="#" class="visited">Visited Link</a>
    <ul>
        <li href="#">Item 1</li>
        <li href="#">Item 2</li>
        <li href="#">Item 3</li>
    </ul>
</body>
</html>

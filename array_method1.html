<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //findIndex willl help u to find the index of the given value
        var students = ["pavani","divya","deepthi","murali","pavani","jyothi"];
        var index=students.findIndex(function(val){
            return val == "murali"
        })
        console.log(index);

        //includes method will help u to check the given value is exist or not in given array
        var result = students.includes("jyothi");
        console.log(result);

        //slice will help u to create a new array from the orginal array
        var result_1 = students.slice(3,6)
        console.log(result_1)
        
        //concat will add two arrays and create a new array
        var secondarr =["vaishu","karthika","akshaya"]
        var thirdarrr = students.concat(secondarr)
        console.log(thirdarrr)



    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 2 x 1 = 2 -->
    <script>
        let num=prompt("Enter a Number to display the tables")
        console.log(num)
        for(i=1;i<=10;i++){
            document.write(num+" X "+ i +" = "+ num*i +"<br>")
        }
    </script>
</body>
</html>

<html>

<head>
    <title>web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        navbar {
            display: flex;
            padding: 10px;
        }

        navbar a {
            text-decoration: none;
            color: black;
        }

        navbar a:hover {
            color: gray;
        }

        form {
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        label {
            display: inline-block;
            width: 140px;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            padding: 6px;
            width: 220px;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>
    <navbar>
        <a href="#home">home</a>
    </navbar>
    <form action="#" method="post">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required><br><br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>

</html>

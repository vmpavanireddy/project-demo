<html>

<head>
    <title>web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        navbar {
            display: flex;
            padding: 10px;
        }

        navbar a {
            text-decoration: none;
            color: black;
        }

        navbar a:hover {
            color: gray;
        }

        form {
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        label {
            display: inline-block;
            width: 140px;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            padding: 6px;
            width: 220px;
            margin-bottom: 14px;
        }
    </style>
</head>

<body>
    <navbar>
        <a href="#home">home</a>
    </navbar>
    <form action="#" method="post">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"><br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="1"><br><br>
        <label for="website">Website:</label>
        <input type="url" id="website" name="website"><br><br>
        <label for="agree">Agree to terms:</label>
        <input type="checkbox" id="agree" name="agree"><br><br>
        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>
        <label for="file">Upload file:</label>
        <input type="file" id="file" name="file"><br><br>
                <label for="address">Address:</label>
        <input type="text" id="address" name="address"><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="0" max="120"><br><br>

        <label for="birthdate">Birth Date:</label>
        <input type="date" id="birthdate" name="birthdate"><br><br>

        <label for="website">Website:</label>
        <input type="url" id="website" name="website"><br><br>

        <label for="search_query">Search:</label>
        <input type="search" id="search_query" name="search_query"><br><br>

        <label for="favorite_color">Favorite Color:</label>
        <input type="color" id="favorite_color" name="favorite_color"><br><br>

        <label for="experience">Experience Level:</label>
        <input type="range" id="experience" name="experience" min="0" max="10"><br><br>

        <label for="start_time">Start Time:</label>
        <input type="time" id="start_time" name="start_time"><br><br>

<input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>

</html>

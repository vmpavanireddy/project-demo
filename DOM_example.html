<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>hello</h1>
    <h2>yo</h2>
    <h3 id="demo">congratulations u leveled up</h3>
    <para>introfuce your intere and hobbies</para>
    <a>rewards</a>
    <ul>
        <li class="mylist">First-Person Shooter</li>
        <li class="mylist">Action-Adventure </li>
        <li class="mylist">Role-Playing Games </li>
        <li class="mylist">Battle Royale Games </li>
        <li class="mylist">Racing Games </li>
        <li class="mylist">Open-World Games</li>
    </ul>
    <button onclick="handlehtmlecontent()">next step</button>
    <script>
        function handlehtmlecontent() {
            document.querySelector("h1").innerHTML = "rules to follw";
            document.querySelector("h1").style.background = "yellow";
            var selectedelement = document.querySelector("h2")
            document.body.removeChild(selectedelement);
            document.querySelector("para").style.background = "red";
            document.querySelector("para").innerHTML = "play,draw,enjoy";


            document.getElementById("demo").style.background = "red"
            document.getElementById("demo").style.color = "white"

            const allclassitems = document.getElementsByClassName("mylist");
            console.log(allclassitems);
            for (i = 0; i < allclassitems.length; i++) {
                allclassitems[i].style.background = "green"
                allclassitems[i].style.margin = "10px"
            }
            const allements = document.getElementsByTagName("li")
            console.log(allements);
            for (i = 0; i < allements.length; i++) {
                allements[i].style.background = "blue"
                allements[i].style.margin = "16px"
            }
            document.querySelector("a").style.color = "purple"
            var alllistitems = document.querySelectorAll(".mylist")
            console.log(alllistitems)
            for (i = 0; i < alllistitems.length; i++) {
                alllistitems[i].style.background = "green"
                alllistitems[i].style.margin = "16px"
            }
            document.querySelector("para").innerHTML = "welcome back to begininng"
            document.querySelector("para").innerText = "welcome back to begininng"


        }
    </script>
</body>

</html>
